services:
  - type: web
    name: sales-crm
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: CRM_HOST
        value: 0.0.0.0
      - key: CRM_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: CRM_ADMIN_USERNAME
        value: admin
      - key: CRM_ADMIN_PASSWORD
        sync: false
